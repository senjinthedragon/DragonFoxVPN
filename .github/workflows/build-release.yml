name: Build Release Executables

on:
  release:
    types: [published]
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Run tests
        run: cargo test

      - name: Build release
        run: cargo build --release

      - name: Package
        run: |
          foreach ($f in Get-ChildItem -Recurse -File README.md, CHANGELOG.md, LICENSE, backend) {
            $content = Get-Content $f.FullName -Raw
            $content = $content -replace "`n", "`r`n"
            Set-Content $f.FullName $content -NoNewline
          }
          Compress-Archive -Path target/release/DragonFoxVPN.exe, README.md, CHANGELOG.md, LICENSE, backend -DestinationPath DragonFoxVPN-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DragonFoxVPN-windows
          path: DragonFoxVPN-windows.zip

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2.3.2
        with:
          files: DragonFoxVPN-windows.zip

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libayatana-appindicator3-dev libgtk-3-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Run tests
        run: cargo test

      - name: Build release
        run: cargo build --release

      - name: Package
        run: |
          cp target/release/DragonFoxVPN .
          tar -czf DragonFoxVPN-linux.tar.gz DragonFoxVPN README.md CHANGELOG.md LICENSE backend

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DragonFoxVPN-linux
          path: DragonFoxVPN-linux.tar.gz

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2.3.2
        with:
          files: DragonFoxVPN-linux.tar.gz
